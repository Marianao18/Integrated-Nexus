# Configuración de nginx para servir React y redirigir peticiones al backend

server {
    listen 80;

    # Servir los archivos estáticos de React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Importante para React Router: si la ruta no existe como archivo,
        # sirve index.html y deja que React maneje el routing
        try_files $uri $uri/ /index.html;
    }

    # Redirigir las peticiones /api/ al backend Django
    # Así el frontend no necesita saber la IP del backend, nginx lo resuelve
    location /api/ {
        proxy_pass http://nexus-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
